# SPA fallback: qualunque rotta non corrisponda a un file statico torna index.html
# (il routing di TanStack Router è lato client). api.config.json è generato a ogni
# avvio (vedi docker/docker-entrypoint.d/): mai in cache.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api.config.json {
        add_header Cache-Control "no-store";
    }
}
